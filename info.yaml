# Tiny Tapeout project information
project:
  title:        "AXI Slave Receiver"
  author:       "karthika28004"
  discord:      ""      # Your discord username (optional)
  description:  "AXI Slave Receiver that handles AXI write and read transactions using Tiny Tapeout IO pins"
  language:     "Verilog"
  clock_hz:     10000000  # 10 MHz
  tiles: "1x1"
  top_module:  "tt_um_axi_slave_receiver"
  source_files:
    - "project.v"

# The pinout of your project.
pinout:
  # Inputs
  ui[0]: "s_axi_awvalid"   # Write Address Valid
  ui[1]: "s_axi_wvalid"    # Write Data Valid
  ui[2]: "s_axi_arvalid"   # Read Address Valid
  ui[3]: "s_axi_rready"    # Read Ready
  ui[4]: "s_axi_bready"    # Write Response Ready
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "s_axi_awready"   # Write Address Ready
  uo[1]: "s_axi_wready"    # Write Data Ready
  uo[2]: "s_axi_arready"   # Read Address Ready
  uo[3]: "s_axi_rvalid"    # Read Data Valid
  uo[4]: "s_axi_bvalid"    # Write Response Valid
  uo[5]: "s_axi_bresp"     # Write Response (OKAY)
  uo[6]: "s_axi_rresp"     # Read Response (OKAY)
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "s_axi_wdata[0]"  # Write Data bit 0
  uio[1]: "s_axi_wdata[1]"  # Write Data bit 1
  uio[2]: "s_axi_wdata[2]"  # Write Data bit 2
  uio[3]: "s_axi_wdata[3]"  # Write Data bit 3
  uio[4]: "s_axi_wdata[4]"  # Write Data bit 4
  uio[5]: "s_axi_wdata[5]"  # Write Data bit 5
  uio[6]: "s_axi_wdata[6]"  # Write Data bit 6
  uio[7]: "s_axi_wdata[7]"  # Write Data bit 7

# Do not change!
yaml_version: 6
